<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#080f1a"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="shieldBreached" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7f1d1d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="shieldIntact" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="crackGlow" x="-50%" y="-10%" width="200%" height="120%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Shield — right half (intact, dark blue) -->
  <path d="M32 8 L51 17 L51 37 Q51 53 32 61"
        fill="url(#shieldIntact)" stroke="#334155" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Shield — left half (breached, red glow) -->
  <path d="M32 8 L13 17 L13 37 Q13 53 32 61"
        fill="url(#shieldBreached)" stroke="#dc2626" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Play triangle (centred, offset slightly right) -->
  <polygon points="23,22 23,43 46,32" fill="url(#play)" filter="url(#glow)"/>

  <!-- Breach crack — jagged vertical split through the shield -->
  <polyline
    points="31,6 33,16 29,24 35,33 30,43 32,62"
    stroke="#0f172a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Crack glow / hot edge -->
  <polyline
    points="31,6 33,16 29,24 35,33 30,43 32,62"
    stroke="#ef4444" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" fill="none"
    opacity="0.75" filter="url(#crackGlow)"/>

  <!-- Impact spark at crack origin (top) -->
  <circle cx="31" cy="8" r="1.5" fill="#fb923c" opacity="0.95"/>
  <circle cx="31" cy="8" r="3" fill="#fb923c" opacity="0.2"/>
</svg>
