server {
    listen 80;
    server_name breachreplay.com www.breachreplay.com _;

    # API — FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        client_max_body_size 50M;
    }

    # WebSocket — simulation rooms
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # React SPA — static build served by nginx
    location / {
        root /var/www/breachreplay;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # Long-cache fingerprinted assets
    location ~* \.(js|css|woff2?|png|jpg|ico|svg)$ {
        root /var/www/breachreplay;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
